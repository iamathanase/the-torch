<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Vendor Dashboard - The Torch</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <img src="../assets/images/logo.png" alt="The Torch Logo" style="height: 50px; width: 50px; border-radius: 50%; margin-right: 0.75rem; display: inline-block; vertical-align: middle; object-fit: cover;">
                <h1 style="display: inline-block; margin: 0;">The Torch</h1>
            </div>
            <div class="search-bar-container" id="search-container" style="display:none;">
                <input type="text" id="global-search" class="search-bar" placeholder="Search orders..." aria-label="Search">
                <button type="button" id="search-btn" class="search-btn" aria-label="Search"><span class="search-icon">🔍</span></button>
            </div>
            <ul class="nav-menu">
                <li><a href="vendor-dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="vendor-products.html" class="nav-link">Products</a></li>
                <li><a href="vendor-orders.html" class="nav-link active">Orders</a></li>
                <li><a href="vendor-settings.html" class="nav-link">Settings</a></li>
                <li><button onclick="logoutVendor()" class="btn-login" id="auth-link">Logout</button></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="vendor-page-container">
        <!-- Header -->
        <header class="page-header">
            <div class="header-content">
                <h1>Order Management</h1>
                <p>Track and manage all customer orders</p>
            </div>
            <div class="header-actions">
                <input type="text" id="search-order" class="search-input" placeholder="Search by Order ID or Customer...">
            </div>
        </header>

        <!-- Filters -->
        <section class="filters-section">
            <div class="filter-group">
                <label for="status-filter">Status:</label>
                <select id="status-filter" onchange="filterOrders()">
                    <option value="">All Orders</option>
                    <option value="pending">Pending</option>
                    <option value="processing">Processing</option>
                    <option value="shipped">Shipped</option>
                    <option value="delivered">Delivered</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="date-filter">Date Range:</label>
                <select id="date-filter" onchange="filterOrders()">
                    <option value="">All Time</option>
                    <option value="today">Today</option>
                    <option value="week">This Week</option>
                    <option value="month">This Month</option>
                </select>
            </div>
        </section>

        <!-- Orders Table -->
        <section class="content-section">
            <div class="section-card">
                <div class="card-header">
                    <h2>Orders</h2>
                    <span class="order-count" id="order-count">Loading...</span>
                </div>
                
                <div class="table-responsive">
                    <table class="orders-table" id="orders-table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Items</th>
                                <th>Amount</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="orders-tbody">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <!-- Order Detail Modal -->
    <div class="modal" id="order-detail-modal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2 id="detail-order-id">Order Details</h2>
                <button class="modal-close" onclick="closeOrderDetail()">×</button>
            </div>
            <div class="modal-body" id="order-detail-body">
                <!-- Populated by JavaScript -->
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeOrderDetail()">Close</button>
                <button class="btn-primary" id="update-status-btn" onclick="updateOrderStatus()">Update Status</button>
            </div>
        </div>
    </div>

    <!-- Status Update Modal -->
    <div class="modal" id="status-update-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Update Order Status</h2>
                <button class="modal-close" onclick="closeStatusModal()">×</button>
            </div>
            <div class="modal-body">
                <p>Update status for <strong id="status-order-id">Order #ORD-8247</strong></p>
                <div class="form-group">
                    <label for="new-status">New Status:</label>
                    <select id="new-status">
                        <option value="pending">Pending</option>
                        <option value="processing">Processing</option>
                        <option value="shipped">Shipped</option>
                        <option value="delivered">Delivered</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="tracking-number">Tracking Number (Optional):</label>
                    <input type="text" id="tracking-number" placeholder="Enter tracking number...">
                </div>
                <div class="form-group">
                    <label for="status-note">Notes:</label>
                    <textarea id="status-note" placeholder="Add any notes..." rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeStatusModal()">Cancel</button>
                <button class="btn-primary" onclick="confirmStatusUpdate()">Update</button>
            </div>
        </div>
    </div>

    <style>
        :root {
            --primary: #1d7c3a;
            --secondary: #27ae60;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --text-dark: #2c3e50;
            --text-light: #95a5a6;
            --border: #ecf0f1;
            --bg-light: #f8f9fa;
        }

        .vendor-page-container {
            min-height: calc(100vh - 70px);
            padding: 2rem;
            background: linear-gradient(135deg, #f5f7fa 0%, #f0f3f7 100%);
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 2rem;
        }

        .header-content h1 {
            margin: 0;
            font-size: 2rem;
            color: var(--text-dark);
        }

        .header-content p {
            margin: 0.5rem 0 0 0;
            color: var(--text-light);
        }

        .header-actions {
            flex: 1;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            background: white;
        }

        .filters-section {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-group label {
            font-weight: 600;
            color: var(--text-dark);
        }

        .filter-group select {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: white;
            cursor: pointer;
        }

        .content-section {
            margin-bottom: 2rem;
        }

        .section-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.25rem;
        }

        .order-count {
            background: var(--bg-light);
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .table-responsive {
            overflow-x: auto;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
        }

        .orders-table thead {
            background: var(--bg-light);
            font-weight: 600;
            color: var(--text-dark);
        }

        .orders-table th {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .orders-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .orders-table tbody tr:hover {
            background: rgba(29, 124, 58, 0.03);
        }

        .order-id {
            font-weight: 600;
            color: var(--primary);
        }

        .status-badge {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(241, 196, 15, 0.15);
            color: #d68910;
        }

        .status-processing {
            background: rgba(52, 152, 219, 0.15);
            color: #2874a6;
        }

        .status-shipped {
            background: rgba(155, 89, 182, 0.15);
            color: #7d3c98;
        }

        .status-delivered {
            background: rgba(46, 204, 113, 0.15);
            color: #27ae60;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn-action {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-lg {
            max-width: 700px;
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        .btn-primary,
        .btn-secondary {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--secondary);
        }

        .btn-secondary {
            background: var(--border);
            color: var(--text-dark);
        }

        .btn-secondary:hover {
            background: #ddd;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .order-detail-item {
            background: var(--bg-light);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .detail-label {
            font-weight: 600;
            color: var(--text-dark);
        }

        .detail-value {
            color: var(--text-light);
        }

        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
            }

            .orders-table {
                font-size: 0.85rem;
            }

            .orders-table th,
            .orders-table td {
                padding: 0.75rem 0.5rem;
            }
        }
    </style>

    <script src="../assets/js/script.js"></script>
    <script>
        // Sample order data
        let vendorOrders = [
            {
                id: 'ORD-8247',
                customer: 'Kwame Asante',
                items: 'Solar Pump × 2',
                amount: 25000,
                date: '2026-04-20',
                status: 'delivered',
                details: {
                    email: 'kwame@example.com',
                    phone: '+233-24-123-4567',
                    address: 'Accra, Ghana',
                    items: [
                        { name: 'Solar Water Pump', qty: 2, price: 12500 }
                    ],
                    total: 25000,
                    notes: 'Delivered successfully'
                }
            },
            {
                id: 'ORD-8248',
                customer: 'Ama Osei',
                items: 'Drip Irrigation Kit × 1, Soil Tester × 3',
                amount: 18500,
                date: '2026-04-19',
                status: 'shipped',
                details: {
                    email: 'ama@example.com',
                    phone: '+233-27-456-7890',
                    address: 'Kumasi, Ghana',
                    items: [
                        { name: 'Drip Irrigation Kit', qty: 1, price: 8500 },
                        { name: 'Soil Testing Equipment', qty: 3, price: 3333.33 }
                    ],
                    total: 18500,
                    notes: 'In transit'
                }
            },
            {
                id: 'ORD-8249',
                customer: 'Kofi Mensah',
                items: 'Solar Pump × 1',
                amount: 12500,
                date: '2026-04-18',
                status: 'processing',
                details: {
                    email: 'kofi@example.com',
                    phone: '+233-50-234-5678',
                    address: 'Takoradi, Ghana',
                    items: [
                        { name: 'Solar Water Pump', qty: 1, price: 12500 }
                    ],
                    total: 12500,
                    notes: 'Being prepared for shipment'
                }
            },
            {
                id: 'ORD-8250',
                customer: 'Abena Boateng',
                items: 'Irrigation Kit × 2, Soil Tester × 1',
                amount: 20300,
                date: '2026-04-17',
                status: 'pending',
                details: {
                    email: 'abena@example.com',
                    phone: '+233-54-789-0123',
                    address: 'Cape Coast, Ghana',
                    items: [
                        { name: 'Drip Irrigation Kit', qty: 2, price: 8500 },
                        { name: 'Soil Testing Equipment', qty: 1, price: 3333.33 }
                    ],
                    total: 20300,
                    notes: 'Awaiting payment confirmation'
                }
            }
        ];

        let currentOrderDetail = null;

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('authToken');
            const user = localStorage.getItem('user');
            
            if (!token || !user) {
                setTimeout(() => window.location.href = 'login.html', 500);
                return;
            }

            loadOrders();
            
            document.getElementById('search-order').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = vendorOrders.filter(order => 
                    order.id.toLowerCase().includes(query) || 
                    order.customer.toLowerCase().includes(query)
                );
                renderOrders(filtered);
            });
        });

        function loadOrders() {
            renderOrders(vendorOrders);
            document.getElementById('order-count').textContent = `${vendorOrders.length} Orders`;
        }

        function renderOrders(orders) {
            const tbody = document.getElementById('orders-tbody');
            tbody.innerHTML = orders.map(order => `
                <tr>
                    <td><span class="order-id">${order.id}</span></td>
                    <td>${order.customer}</td>
                    <td>${order.items}</td>
                    <td>₵${order.amount.toLocaleString()}</td>
                    <td>${new Date(order.date).toLocaleDateString()}</td>
                    <td><span class="status-badge status-${order.status}">${order.status.charAt(0).toUpperCase() + order.status.slice(1)}</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-action" onclick="viewOrderDetail('${order.id}')">View</button>
                            <button class="btn-action" onclick="openStatusUpdate('${order.id}')">Update</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function filterOrders() {
            const statusFilter = document.getElementById('status-filter').value;
            const dateFilter = document.getElementById('date-filter').value;
            
            let filtered = vendorOrders;

            if (statusFilter) {
                filtered = filtered.filter(order => order.status === statusFilter);
            }

            if (dateFilter) {
                const today = new Date();
                filtered = filtered.filter(order => {
                    const orderDate = new Date(order.date);
                    if (dateFilter === 'today') return orderDate.toDateString() === today.toDateString();
                    if (dateFilter === 'week') return (today - orderDate) / (1000 * 60 * 60 * 24) <= 7;
                    if (dateFilter === 'month') return (today - orderDate) / (1000 * 60 * 60 * 24) <= 30;
                    return true;
                });
            }

            renderOrders(filtered);
        }

        function viewOrderDetail(orderId) {
            const order = vendorOrders.find(o => o.id === orderId);
            if (!order) return;

            currentOrderDetail = order;
            document.getElementById('detail-order-id').textContent = `Order ${order.id}`;
            
            const itemsHtml = order.details.items.map(item => `
                <div class="detail-row">
                    <span class="detail-label">${item.name} × ${item.qty}</span>
                    <span class="detail-value">₵${item.price.toLocaleString()}</span>
                </div>
            `).join('');

            const detailHtml = `
                <div class="order-detail-item">
                    <div class="detail-row">
                        <span class="detail-label">Order ID</span>
                        <span class="detail-value">${order.id}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Customer</span>
                        <span class="detail-value">${order.customer}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Email</span>
                        <span class="detail-value">${order.details.email}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Phone</span>
                        <span class="detail-value">${order.details.phone}</span>
                    </div>
                </div>

                <h3 style="margin-top: 1.5rem; margin-bottom: 0.5rem;">Order Items</h3>
                <div class="order-detail-item">
                    ${itemsHtml}
                    <div class="detail-row" style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #ddd; font-weight: 700;">
                        <span class="detail-label">Total</span>
                        <span class="detail-value">₵${order.details.total.toLocaleString()}</span>
                    </div>
                </div>

                <h3 style="margin-top: 1.5rem; margin-bottom: 0.5rem;">Status</h3>
                <div class="order-detail-item">
                    <div class="detail-row">
                        <span class="detail-label">Current Status</span>
                        <span class="status-badge status-${order.status}">${order.status.toUpperCase()}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Order Date</span>
                        <span class="detail-value">${new Date(order.date).toLocaleDateString()}</span>
                    </div>
                </div>
            `;

            document.getElementById('order-detail-body').innerHTML = detailHtml;
            document.getElementById('order-detail-modal').classList.add('active');
        }

        function closeOrderDetail() {
            document.getElementById('order-detail-modal').classList.remove('active');
            currentOrderDetail = null;
        }

        function openStatusUpdate(orderId) {
            const order = vendorOrders.find(o => o.id === orderId);
            if (!order) return;

            currentOrderDetail = order;
            document.getElementById('status-order-id').textContent = `Order ${order.id}`;
            document.getElementById('new-status').value = order.status;
            document.getElementById('tracking-number').value = '';
            document.getElementById('status-note').value = '';

            closeOrderDetail();
            document.getElementById('status-update-modal').classList.add('active');
        }

        function closeStatusModal() {
            document.getElementById('status-update-modal').classList.remove('active');
        }

        function confirmStatusUpdate() {
            if (!currentOrderDetail) return;

            const newStatus = document.getElementById('new-status').value;
            const trackingNumber = document.getElementById('tracking-number').value;
            const note = document.getElementById('status-note').value;

            const orderIndex = vendorOrders.findIndex(o => o.id === currentOrderDetail.id);
            if (orderIndex >= 0) {
                vendorOrders[orderIndex].status = newStatus;
                if (trackingNumber) vendorOrders[orderIndex].details.trackingNumber = trackingNumber;
                if (note) vendorOrders[orderIndex].details.notes = note;
            }

            renderOrders(vendorOrders);
            closeStatusModal();
            alert('Order status updated successfully!');
        }

        function logoutVendor() {
            if (confirm('Sign out?')) {
                ['authToken', 'userRole', 'userId', 'user', 'cart'].forEach(key => localStorage.removeItem(key));
                setTimeout(() => window.location.href = '../index.html', 100);
            }
        }
    </script>
</body>
</html>
