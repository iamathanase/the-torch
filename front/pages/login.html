<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to FarmDialogue - Empowering African Farmers">
    <title>Login - The Torch FarmDialogue</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <h1>The Torch</h1>
            </div>
            <div class="search-bar-container" id="search-container" style="display: none;">
                <input type="text" id="global-search" class="search-bar" placeholder="Search products, guides..." aria-label="Search">
                <button type="button" id="search-btn" class="search-btn" aria-label="Search"><span class="search-icon">🔍</span></button>
            </div>
            <ul class="nav-menu">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="learning.html" class="nav-link">Learning</a></li>
                <li><a href="products.html" class="nav-link">Products</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
                <li><a href="login.html" class="nav-link active" id="auth-link">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- Login Section -->
    <div class="login-container">
        <div class="login-box">
            <div class="modal-header" style="text-align: center; border: none; margin-bottom: 2rem;">
                <h2 style="font-size: 2rem; color: var(--primary);">Welcome Back</h2>
                <p style="color: var(--text-light); font-size: 1rem; margin-top: 0.5rem;">Access your Torch account</p>
            </div>
            
            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Keep me logged in</label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Sign In</button>

                <div style="text-align: center; margin-top: 1rem;">
                    <a href="#" style="color: var(--primary); font-weight: 600; font-size: 0.9rem;">Forgot your password?</a>
                </div>
            </form>

            <div class="register-link">
                <p style="margin: 0; color: var(--text-light);">New to The Torch?</p>
                <a href="register.html" style="color: var(--primary); font-weight: 700; font-size: 1rem;">Create an account</a>
            </div>
        </div>
    </div>

    <script src="../assets/js/script.js"></script>
    <script src="../assets/js/search.js"></script>
</body>
</html>
