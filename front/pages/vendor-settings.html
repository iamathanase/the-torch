<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Vendor Dashboard</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --dark-bg: #0f1419;
            --card-bg: #1a1f2e;
            --primary: #1d7c3a;
            --success: #27ae60;
            --border-color: #2a3142;
            --text-primary: #ffffff;
            --text-secondary: #b0b8c1;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--dark-bg); color: var(--text-primary); }
        .dashboard-container { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

        .sidebar {
            background: rgba(26, 31, 46, 0.95);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            overflow-y: auto;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .brand { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border-color); }
        .brand-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #1d7c3a 0%, #27ae60 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.25rem; color: white; }
        .brand-text h2 { font-size: 1rem; font-weight: 700; margin: 0; color: var(--text-primary); }
        .brand-text p { font-size: 0.7rem; color: var(--text-secondary); margin: 0.25rem 0 0 0; text-transform: uppercase; }

        .nav-section { margin-bottom: 3rem; flex: 1; }
        .nav-section:last-of-type { margin-bottom: 0; margin-top: auto; }
        .nav-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 1.25rem; font-weight: 700; }
        .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }

        .nav-link {
            display: flex; align-items: center; gap: 1rem; padding: 0.875rem 1rem; color: var(--text-secondary); text-decoration: none; border-radius: 8px; transition: all 0.3s ease; font-size: 0.95rem; font-weight: 500;
        }

        .nav-link:hover { background: rgba(29, 124, 58, 0.1); color: #27ae60; }
        .nav-link.active { background: rgba(29, 124, 58, 0.15); color: #1d7c3a; border-left: 3px solid #1d7c3a; }
        .nav-icon { width: 20px; height: 20px; font-size: 1rem; }

        .user-section { background: rgba(29, 124, 58, 0.1); border: 1px solid var(--border-color); border-radius: 8px; padding: 1rem; display: flex; align-items: center; gap: 0.75rem; }
        .user-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #1d7c3a 0%, #27ae60 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; }
        .user-info h3 { font-size: 0.9rem; font-weight: 600; margin: 0; color: var(--text-primary); }
        .user-info p { font-size: 0.75rem; color: var(--text-secondary); margin: 0.25rem 0 0 0; }

        .main-content { overflow-y: auto; background: var(--dark-bg); }

        .header {
            background: rgba(26, 31, 46, 0.5);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
        .header-title p { font-size: 0.9rem; color: var(--text-secondary); margin: 0.25rem 0 0 0; }

        .content { padding: 2rem; max-width: 1600px; }

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .page-title { font-size: 1.75rem; font-weight: 700; margin: 0; }

        .settings-grid {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
        }

        .settings-sidebar {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .settings-nav {
            list-style: none;
        }

        .settings-nav li {
            border-bottom: 1px solid var(--border-color);
        }

        .settings-nav li:last-child {
            border-bottom: none;
        }

        .settings-nav button {
            width: 100%;
            padding: 1rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            text-align: left;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .settings-nav button:hover {
            background: rgba(29, 124, 58, 0.1);
            color: #27ae60;
        }

        .settings-nav button.active {
            background: rgba(29, 124, 58, 0.15);
            color: #1d7c3a;
            border-left: 3px solid #1d7c3a;
            padding-left: calc(1rem - 3px);
        }

        .settings-content {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
        }

        .settings-section {
            margin-bottom: 2rem;
        }

        .settings-section h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
        }

        .form-input::placeholder { color: var(--text-secondary); }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary { background: #1d7c3a; color: white; }
        .btn-primary:hover { background: #27ae60; }

        .btn-secondary { background: rgba(29, 124, 58, 0.1); color: #1d7c3a; }
        .btn-secondary:hover { background: rgba(29, 124, 58, 0.2); }

        /* RESPONSIVE DESIGN */
        @media (max-width: 1199px) {
            .dashboard-container { grid-template-columns: 240px 1fr; }
            .sidebar { padding: 1.5rem 1rem; }
            .settings-grid { grid-template-columns: 1fr; }
            .settings-sidebar { position: static; height: auto; }
        }

        @media (max-width: 1023px) {
            .dashboard-container { grid-template-columns: 1fr; }
            .sidebar { display: none; position: fixed; left: 0; top: 0; width: 260px; height: 100vh; z-index: 1000; box-shadow: 2px 0 12px rgba(0,0,0,0.3); }
            .sidebar.open { display: flex; }
            .hamburger { display: block; }
            .header { padding: 1rem; }
            .content { padding: 1rem; }
            .settings-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 767px) {
            .sidebar { width: 100%; max-height: 80vh; padding: 1rem; }
            .brand { margin-bottom: 1.5rem; }
            .brand-icon { width: 40px; height: 40px; }
            .nav-link { padding: 0.7rem; font-size: 0.85rem; }
            .user-info h3 { font-size: 0.85rem; }
            .header { padding: 0.75rem; flex-direction: column; gap: 0.5rem; }
            .header-title h1 { font-size: 1.2rem; }
            .content { padding: 0.75rem; }
            .page-title { font-size: 1.3rem; }
            .settings-grid { grid-template-columns: 1fr; gap: 1rem; }
            .settings-sidebar { height: auto; display: block; }
            .settings-nav button { padding: 0.75rem; }
            .settings-content { padding: 1.5rem; }
        }

        @media (max-width: 479px) {
            .sidebar { width: 100%; padding: 0.75rem; }
            .nav-link span:last-child { display: none; }
            .brand-icon { width: 36px; height: 36px; font-size: 1rem; }
            .header { padding: 0.5rem; }
            .header-title h1 { font-size: 1rem; }
            .content { padding: 0.5rem; }
            .page-title { font-size: 1.1rem; }
            .settings-grid { grid-template-columns: 1fr; gap: 0.5rem; }
            .settings-sidebar { margin-bottom: 1rem; }
            .settings-nav button { padding: 0.6rem 0.75rem; font-size: 0.85rem; }
            .settings-content { padding: 0.75rem; }
            .settings-section h3 { font-size: 0.95rem; }
            .form-label { font-size: 0.85rem; }
            .form-input { padding: 0.6rem; font-size: 0.85rem; }
            .btn { padding: 0.6rem 1rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">T</div>
                <div class="brand-text">
                    <h2>The Torch</h2>
                    <p>Ghana</p>
                </div>
            </div>

            <nav class="nav-section">
                <div class="nav-label">Menu</div>
                <ul class="nav-menu">
                    <li><a href="vendor-dashboard.html" class="nav-link"><span class="nav-icon">⊞</span> Dashboard</a></li>
                    <li><a href="vendor-products.html" class="nav-link"><span class="nav-icon">◻</span> Products</a></li>
                    <li><a href="vendor-orders.html" class="nav-link"><span class="nav-icon">⊟</span> Orders</a></li>
                    <li><a href="vendor-settings.html" class="nav-link active"><span class="nav-icon">⚙</span> Settings</a></li>
                </ul>
            </nav>

            <nav class="nav-section">
                <div class="nav-label">Account</div>
                <ul class="nav-menu">
                    <li><a href="#" class="nav-link" onclick="logoutVendor(); return false;"><span class="nav-icon">↪</span> Logout</a></li>
                </ul>
            </nav>

            <div class="user-section">
                <div class="user-avatar" id="userInitial">V</div>
                <div class="user-info">
                    <h3 id="userName">Vendor</h3>
                    <p id="userEmail">vendor@torch.com</p>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <header class="header">
                <div>
                    <h1 class="header-title" style="margin-bottom: 0;">Settings</h1>
                    <p class="header-title" style="margin: 0.5rem 0 0 0; color: var(--text-secondary); font-size: 0.9rem; font-weight: 400;">Manage your account preferences</p>
                </div>
            </header>

            <div class="content">
                <div class="page-header">
                    <h2 class="page-title">Account Settings</h2>
                </div>

                <div class="settings-grid">
                    <div class="settings-sidebar">
                        <ul class="settings-nav">
                            <li><button class="active" onclick="showTab('profile')">Profile</button></li>
                            <li><button onclick="showTab('business')">Business</button></li>
                            <li><button onclick="showTab('payment')">Payment</button></li>
                            <li><button onclick="showTab('security')">Security</button></li>
                        </ul>
                    </div>

                    <div class="settings-content">
                        <!-- Profile Tab -->
                        <div id="profile-tab" class="settings-section" style="display: block;">
                            <h3>Profile Information</h3>
                            <div class="form-group">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-input" placeholder="Your first name" id="firstName">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-input" placeholder="Your last name" id="lastName">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-input" placeholder="your@email.com" id="emailField">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Phone</label>
                                <input type="tel" class="form-input" placeholder="+233 XX XXX XXXX">
                            </div>
                            <button class="btn btn-primary">Save Changes</button>
                        </div>

                        <!-- Business Tab -->
                        <div id="business-tab" class="settings-section" style="display: none;">
                            <h3>Business Details</h3>
                            <div class="form-group">
                                <label class="form-label">Business Name</label>
                                <input type="text" class="form-input" placeholder="Your business name">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Business Type</label>
                                <select class="form-input">
                                    <option>Select type</option>
                                    <option>Sole Proprietor</option>
                                    <option>Partnership</option>
                                    <option>Company</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Description</label>
                                <textarea class="form-input" rows="4" placeholder="Describe your business..."></textarea>
                            </div>
                            <button class="btn btn-primary">Save Changes</button>
                        </div>

                        <!-- Payment Tab -->
                        <div id="payment-tab" class="settings-section" style="display: none;">
                            <h3>Payment Methods</h3>
                            <div class="form-group">
                                <label class="form-label">Bank Account Name</label>
                                <input type="text" class="form-input" placeholder="Account holder name">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Account Number</label>
                                <input type="text" class="form-input" placeholder="Your account number">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Bank Name</label>
                                <input type="text" class="form-input" placeholder="Your bank">
                            </div>
                            <button class="btn btn-primary">Save Payment Details</button>
                        </div>

                        <!-- Security Tab -->
                        <div id="security-tab" class="settings-section" style="display: none;">
                            <h3>Security Settings</h3>
                            <div class="form-group">
                                <label class="form-label">Current Password</label>
                                <input type="password" class="form-input" placeholder="Enter current password">
                            </div>
                            <div class="form-group">
                                <label class="form-label">New Password</label>
                                <input type="password" class="form-input" placeholder="Enter new password">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Confirm Password</label>
                                <input type="password" class="form-input" placeholder="Confirm new password">
                            </div>
                            <button class="btn btn-primary">Change Password</button>
                            <button class="btn btn-secondary" style="margin-left: 1rem;">Enable 2FA</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/script.js"></script>
    <script>
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.settings-section').forEach(tab => {
                tab.style.display = 'none';
            });
            
            // Show selected tab
            document.getElementById(tabName + '-tab').style.display = 'block';
            
            // Update active button
            document.querySelectorAll('.settings-nav button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar) sidebar.classList.toggle('open');
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar) sidebar.classList.remove('open');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('authToken');
            const user = localStorage.getItem('user');
            if (!token || !user) {
                window.location.href = 'login.html';
                return;
            }
            
            const userData = JSON.parse(user);
            document.getElementById('userName').textContent = userData.firstName + ' ' + userData.lastName;
            document.getElementById('userEmail').textContent = userData.email;
            document.getElementById('userInitial').textContent = userData.firstName.charAt(0).toUpperCase();
            
            // Populate profile fields
            document.getElementById('firstName').value = userData.firstName;
            document.getElementById('lastName').value = userData.lastName;
            document.getElementById('emailField').value = userData.email;

            // Close sidebar when clicking on a nav link
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                link.addEventListener('click', () => closeSidebar());
            });

            // Close sidebar when clicking outside on mobile
            document.addEventListener('click', (e) => {
                const sidebar = document.getElementById('sidebar');
                const hamburger = document.querySelector('.hamburger');
                if (window.innerWidth <= 1023) {
                    if (sidebar && hamburger && !sidebar.contains(e.target) && !hamburger.contains(e.target)) {
                        sidebar.classList.remove('open');
                    }
                }
            });
        });

        function logoutVendor() {
            if (confirm('Sign out?')) {
                ['authToken', 'userRole', 'userId', 'user', 'cart'].forEach(key => localStorage.removeItem(key));
                window.location.href = '../index.html';
            }
        }
    </script>
</body>
</html>
