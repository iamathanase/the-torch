<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - The Torch</title>
    <meta name="description" content="Search results for The Torch Initiative products and resources">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <img src="../assets/images/logo.png" alt="The Torch Logo" style="height: 50px; width: 50px; border-radius: 50%; margin-right: 0.75rem; display: inline-block; vertical-align: middle; object-fit: cover;">
                <h1 style="display: inline-block; margin: 0;">The Torch</h1>
            </div>
            <div class="search-bar-container" id="search-container" style="display: none;">
                <input type="text" id="global-search" class="search-bar" placeholder="Search products, guides..." aria-label="Search">
                <button type="button" id="search-btn" class="search-btn" aria-label="Search"><span class="search-icon">🔍</span></button>
            </div>
            <ul class="nav-menu">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="products.html" class="nav-link">Products</a></li>
                <li><a href="learning.html" class="nav-link">Learn</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
                <li><a href="login.html" class="btn-login" id="auth-link">Sign In</a></li>
            </ul>
            <button class="menu-toggle">☰</button>
        </div>
    </nav>

    <!-- Search Results Page -->
    <section class="section" style="padding-top: 8rem;">
        <div class="section-header">
            <h2 class="section-title">Search Results</h2>
            <p class="section-description" id="search-query-display">Results for: <strong></strong></p>
        </div>

        <!-- Search Controls -->
        <div class="search-controls">
            <div class="search-bar-wide">
                <input type="text" id="search-input" class="search-input-wide" placeholder="Refine your search..." aria-label="Refine search">
                <button type="button" id="refine-search-btn" class="search-btn-wide" aria-label="Refine search"><span>🔍</span></button>
            </div>
            <div class="search-filters">
                <label>Filter by:</label>
                <select id="category-filter" class="filter-select">
                    <option value="">All Categories</option>
                    <option value="produce">Produce</option>
                    <option value="seeds">Seeds</option>
                    <option value="equipment">Equipment</option>
                    <option value="fertilizer">Fertilizer</option>
                    <option value="tools">Tools</option>
                </select>
            </div>
        </div>

        <!-- Results Container -->
        <div class="search-results-container">
            <div id="loading-state" class="loading-state" style="display: none;">
                <p>Searching...</p>
            </div>
            <div id="no-results-state" class="no-results-state" style="display: none;">
                <p>No results found. Try different keywords or browse all products.</p>
                <a href="products.html" class="btn btn-primary">Browse All Products</a>
            </div>
            <div id="results-grid" class="products-grid"></div>
        </div>
    </section>

    <script src="../assets/js/search.js"></script>
    <script>
        // Initialize search on this page
        document.addEventListener('DOMContentLoaded', () => {
            initializeSearchPage();
        });
    </script>
</body>
</html>
